# Tactical preset — dark pitch, role-colored players, analysis overlays.
name: tactical

styles:
  pitch:
    theme: tactical

layers:
  - name: pitch_markings
    display_name: Pitch
    type: PitchMarkings
    z_order: 10
    category: pitch
    style: { grass_color: "#1a1a2e", line_color: "#e8e8e8" }

  - name: half_space_lines
    display_name: Half-spaces
    type: HalfSpaceLines
    z_order: 20
    category: overlay
    style: { color: "#ffffff", opacity: 0.18 }

  - name: shape_graph
    display_name: Shape graph
    type: EdgeSetOverlay
    z_order: 30
    category: overlay
    enabled: true
    style: { relation: shape_graph, team: both, color: "#A9A9A9", line_width: 1.5, opacity: 0.6 }

  # Same renderer, different relation product — computed lazily on first enable.
  - name: proximity
    display_name: Proximity (< 12 m)
    type: EdgeSetOverlay
    z_order: 25
    category: overlay
    enabled: false
    style: { relation: proximity, team: both, color: "#67e8f9", line_width: 1.0, opacity: 0.35 }

  # Red zone (Tanner 2026) — space between the defensive and first midfield
  # line; team: both | home | away | defending (only the team out of possession).
  - name: redzone
    display_name: Red zone
    type: RedzoneOverlay
    z_order: 28
    category: overlay
    enabled: false
    style: { team: both, opacity: 0.25 }

  - name: team_glyphs
    display_name: Players
    type: TeamColorGlyph
    z_order: 40
    category: player
    style: { team: both, color_mode: dominant, goalkeeper_color: "#EDEDED" }

  - name: defensive_line
    display_name: Defensive line
    type: DefensiveLineOverlay
    z_order: 50
    category: overlay
    enabled: false
    style: { team: both, opacity: 0.55 }

  - name: shirt_numbers
    display_name: Shirt numbers
    type: ShirtNumberLabel
    z_order: 60
    category: player
    style: { color: "#111111" }

  - name: ball
    display_name: Ball
    type: BallGlyph
    z_order: 70
    category: overlay
    style: { color: "#ffffff", edge_color: "#000000" }

# Timeline overlays — band: full | home | away for area layers,
# team: both | home | away to filter marker layers.
timeline:
  - name: lanes
    display_name: Lanes
    type: LaneFurniture
    z_order: 4

  - name: sections
    display_name: Periods
    type: SectionBoundaries
    z_order: 6

  - name: whistles
    display_name: Whistles
    type: EventMarkers
    z_order: 10
    style: { kinds: [whistle] }

  - name: cards
    display_name: Cards
    type: EventMarkers
    z_order: 12
    style: { kinds: [card] }

  - name: subs
    display_name: Substitutions
    type: EventMarkers
    z_order: 14
    style: { kinds: [sub] }

  - name: shots
    display_name: Shots & goals
    type: ShotMarkers
    z_order: 16

  - name: redzone_area
    display_name: Red zone size
    type: RedzoneAreaChart
    z_order: 3
    enabled: false
    style: { window_seconds: 5, opacity: 0.35 }

position:
  - name: role_heatmap
    display_name: Role heatmap
    type: RoleHeatmap
    z_order: 10

  # Builds after the heatmap (higher z_order) — reuses its row bands.
  - name: redzone_presence
    display_name: In opponent red zone
    type: RedzonePresence
    z_order: 15
    enabled: false
    category: data

  - name: sections
    display_name: Periods
    type: SectionBoundaries
    z_order: 20

  - name: substitutions
    display_name: Substitutions
    type: SubstitutionMarkers
    z_order: 30
