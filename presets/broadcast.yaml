# Broadcast preset — green grass, team shirt colors, minimal overlays.
name: broadcast

styles:
  pitch:
    theme: broadcast

layers:
  - name: pitch_markings
    display_name: Pitch
    type: PitchMarkings
    z_order: 10
    category: pitch
    style: { grass_color: "#2e7d46", line_color: "#ffffff" }

  - name: shape_graph
    display_name: Shape graph
    type: ShapeGraphOverlay
    z_order: 30
    category: overlay
    enabled: false
    style: { team: both, color: "#dddddd", line_width: 1.2, opacity: 0.5 }

  - name: team_glyphs
    display_name: Players
    type: TeamColorGlyph
    z_order: 40
    category: player
    style: { team: both, color_mode: team }

  - name: velocity_arrows
    display_name: Velocity
    type: VelocityArrow
    z_order: 45
    category: player
    enabled: false
    style: { team: both, scale: 0.6, color: "#ffee66" }

  - name: shirt_numbers
    display_name: Shirt numbers
    type: ShirtNumberLabel
    z_order: 60
    category: player

  - name: ball
    display_name: Ball
    type: BallGlyph
    z_order: 70
    category: overlay
    style: { color: "#ffffff", edge_color: "#000000" }

timeline:
  - name: possession
    display_name: Possession
    type: PossessionChart
    z_order: 2
    enabled: false
    style: { window_seconds: 90, linewidth: 1.5, home_color: "#d00000", away_color: "#215CAF" }

  - name: lanes
    display_name: Lanes
    type: LaneFurniture
    z_order: 4

  - name: sections
    display_name: Periods
    type: SectionBoundaries
    z_order: 6

  - name: whistles
    display_name: Whistles
    type: EventMarkers
    z_order: 10
    style: { kinds: [whistle] }

  - name: cards
    display_name: Cards
    type: EventMarkers
    z_order: 12
    style: { kinds: [card] }

  - name: subs
    display_name: Substitutions
    type: EventMarkers
    z_order: 14
    style: { kinds: [sub] }

  - name: shots
    display_name: Shots & goals
    type: ShotMarkers
    z_order: 16
